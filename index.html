<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Campus Viewer</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #eceff1;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        /* The 3D Canvas viewport */
        model-viewer {
            width: 100%;
            flex-grow: 1;
            background-color: #ffffff;
            --poster-color: transparent;
        }
        /* Neat UI Overlay Panel */
        .ui-panel {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            backdrop-filter: blur(4px);
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 10;
        }
        button, select {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            font-size: 14px;
            transition: background 0.2s;
        }
        button {
            background-color: #0288d1;
            color: white;
        }
        button:hover {
            background-color: #01579b;
        }
        select {
            background-color: #f1f3f4;
            color: #333;
            border: 1px solid #cfd8dc;
            outline: none;
        }
        select:focus {
            border-color: #0288d1;
        }
        .divider {
            width: 1px;
            height: 24px;
            background-color: #cfd8dc;
            margin: 0 4px;
        }

        /* Loading Screen Overlay CSS */
        #loadingOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        #loadingOverlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .loading-box {
            background: white;
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
        .spinner {
            width: 30px;
            height: 30px;
            border: 4px solid #cfd8dc;
            border-top-color: #0288d1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Title Card Overlay */
        #title-card {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #111111; /* Solid dark background */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 99; /* Keeps it on top of everything */
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        .title-content {
            max-width: 600px;
            padding: 40px;
        }
        .title-content h1 {
            font-size: 32px;
            letter-spacing: 4px;
            margin: 0 0 5px 0;
        }
        .title-content h2 {
            font-size: 14px;
            color: #ff4444; /* Red accent */
            letter-spacing: 3px;
            margin: 0 0 25px 0;
        }
        .title-content p {
            font-size: 15px;
            line-height: 1.6;
            color: #aaaaaa;
            margin-bottom: 40px;
        }
        #enter-btn {
            background: transparent;
            color: white;
            border: 2px solid white;
            padding: 15px 40px;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        #enter-btn:hover {
            background: white;
            color: #111111;
        }
        .hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="title-card">
        <div class="title-content">
            <h1>SUNN VIRTUAL CAMPUS</h1>
            <h2>INTERACTIVE 3D EXPLORER</h2>
            <p>Experience an immersive architectural walkthrough of the campus grounds. Navigate between distinct facilities, explore pedestrian-level views, and interact with the 3D environment.</p>
            <button id="enter-btn">START EXPLORING</button>
        </div>
    </div>

    <div id="loadingOverlay">
        <div class="loading-box">
            <div class="spinner"></div>
            <span>Loading Model...</span>
        </div>
    </div>

    <model-viewer 
        id="buildingViewer"
        src="building.glb"
        environment-image="HDRI_puresky_1k.hdr"
        skybox-image="HDRI_puresky_1k.hdr"
        camera-controls
        auto-rotate
        camera-orbit="0deg 85deg auto"
        max-camera-orbit="auto 90deg auto"
        ar
        ar-modes="webxr scene-viewer quick-look"
        shadow-intensity="1.5"
        shadow-softness="0.8"
        alt="Interactive 3D view of the campus">
    </model-viewer>

    <div class="ui-panel">
        <select id="modelSelector">
            <option value="building.glb">Main Building (Present)</option>
            <option value="Old_Sagay_Campus.glb">Old Campus Compound</option>
        </select>
        
        <div class="divider"></div>
        
        <button id="toggleRotation">Pause Rotation</button>
        <button id="resetCam">Reset View</button>
    </div>

    <script>
        const viewer = document.getElementById('buildingViewer');
        const rotateBtn = document.getElementById('toggleRotation');
        const resetBtn = document.getElementById('resetCam');
        const modelSelector = document.getElementById('modelSelector');
        const loadingOverlay = document.getElementById('loadingOverlay');

        // Hide Title Card on Click
        document.getElementById('enter-btn').addEventListener('click', () => {
            document.getElementById('title-card').classList.add('hidden');
        });

        // Show the loading screen when a new model is selected
        modelSelector.addEventListener('change', (event) => {
            loadingOverlay.classList.add('active'); // Make pop-up visible
            viewer.src = event.target.value;        // Start loading new model
        });

        // Hide the loading screen exactly when the model finishes loading
        viewer.addEventListener('load', () => {
            loadingOverlay.classList.remove('active');
        });

        // Toggle auto-rotation feature
        rotateBtn.addEventListener('click', () => {
            if (viewer.hasAttribute('auto-rotate')) {
                viewer.removeAttribute('auto-rotate');
                rotateBtn.innerText = "Start Rotation";
            } else {
                viewer.setAttribute('auto-rotate', '');
                rotateBtn.innerText = "Pause Rotation";
            }
        });
        
        // Reset Camera
        resetBtn.addEventListener('click', () => {
            viewer.cameraOrbit = "0deg 85deg auto";
        });
    </script>
</body>
</html>
